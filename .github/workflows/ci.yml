name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dexter
          POSTGRES_USER: dexter
          POSTGRES_PASSWORD: dexter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dexter -d dexter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://dexter:dexter@localhost:5432/dexter
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/15
          QDRANT_URL: http://localhost:6333
          SECRET_KEY: ci-secret-key-ci-secret-key-ci-secret-key
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          DEFAULT_LLM_PROVIDER: gemini
          LLM_API_KEY: test-llm
          LLM_MODEL: gemini-2.5-flash
          LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
          ENVIRONMENT: dev
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker image
        run: docker build -f docker/Dockerfile -t dexter-ci:latest .
